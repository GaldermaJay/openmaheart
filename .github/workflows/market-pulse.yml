name: Market Pulse

on:
  workflow_dispatch:
  schedule:
    # KST 07:00, 08:00, 09:00, 16:00, 22:00, Nasdaq open 22:30(DST)/23:30(standard)
    - cron: "0 22 * * *"
    - cron: "0 23 * * *"
    - cron: "0 0 * * *"
    - cron: "0 7 * * *"
    - cron: "0 13 * * *"
    - cron: "30 13 * * 1-5"
    - cron: "30 14 * * *"

concurrency:
  group: market-pulse
  cancel-in-progress: false

permissions:
  contents: write
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: https://galdermajay.github.io/openmaheart/

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Decrypt private source
        run: node scripts/crypto-bundle.mjs decrypt-source
        env:
          DASHBOARD_PASSWORD: ${{ secrets.DASHBOARD_PASSWORD }}

      - name: Restore encrypted state
        run: node scripts/crypto-bundle.mjs decrypt-state
        env:
          DASHBOARD_PASSWORD: ${{ secrets.DASHBOARD_PASSWORD }}

      - name: Refresh market snapshot
        working-directory: work
        run: npm run refresh:market
        env:
          CRYPTO_REFRESH_MODE: nasdaq-open
          FORCE_CRYPTO_REFRESH: ${{ github.event_name == 'workflow_dispatch' || github.event.schedule == '30 13 * * 1-5' || github.event.schedule == '30 14 * * *' }}
          SEC_USER_AGENT: ${{ vars.SEC_USER_AGENT || 'GaldermaJay openmaheart GitHub Actions' }}

      - name: Validate market snapshot
        working-directory: work
        run: npm run validate:market

      - name: Re-encrypt state
        run: node scripts/crypto-bundle.mjs encrypt-state
        env:
          DASHBOARD_PASSWORD: ${{ secrets.DASHBOARD_PASSWORD }}

      - name: Build encrypted Pages artifact
        working-directory: work
        run: npm run build:secure
        env:
          DASHBOARD_PASSWORD: ${{ secrets.DASHBOARD_PASSWORD }}

      - name: Commit encrypted state
        run: |
          if git diff --quiet -- state.enc; then
            echo "No encrypted state changes to commit."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add state.enc
            git commit -m "chore: refresh encrypted market state"
            git push
          fi

      - name: Publish Pages branch
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          tmpdir="$(mktemp -d)"
          cp -R work/dist/. "$tmpdir/"
          git -C "$tmpdir" init -b gh-pages
          git -C "$tmpdir" config user.name "github-actions[bot]"
          git -C "$tmpdir" config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git -C "$tmpdir" add .
          git -C "$tmpdir" commit -m "deploy: publish secure dashboard"
          git -C "$tmpdir" remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git -C "$tmpdir" push --force origin gh-pages
